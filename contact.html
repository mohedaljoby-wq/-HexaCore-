<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us | HexaCore</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                    colors: { gold: '#FFD700', goldDark: '#CCAC00' }
                }
            }
        }
    </script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="flex flex-col min-h-screen font-sans antialiased selection:bg-gold selection:text-black">

    <!-- Navigation -->
    <nav class="bg-black/80 backdrop-blur-md sticky top-0 z-50 border-b border-white/10 transition-all">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex items-center justify-between h-20">
                <div class="flex-shrink-0">
                    <a href="index.html" class="text-3xl font-bold tracking-widest text-white">
                        HEXA<span class="text-gold glow-text">CORE</span>
                    </a>
                </div>
                <div class="hidden md:block">
                    <div class="ml-10 flex items-baseline space-x-8">
                        <a href="index.html" class="text-gray-300 hover:text-gold hover:glow-text transition-all duration-300 px-3 py-2 text-sm font-medium">Home</a>
                        <a href="about.html" class="text-gray-300 hover:text-gold hover:glow-text transition-all duration-300 px-3 py-2 text-sm font-medium">About</a>
                        <a href="features.html" class="text-gray-300 hover:text-gold hover:glow-text transition-all duration-300 px-3 py-2 text-sm font-medium">Features</a>
                        <a href="tools.html" class="text-gray-300 hover:text-gold hover:glow-text transition-all duration-300 px-3 py-2 text-sm font-medium">Tools</a>
                        <a href="contact.html" class="text-gold border-b-2 border-gold px-3 py-2 text-sm font-medium transition-all duration-300">Contact</a>
                    </div>
                </div>
                <div class="-mr-2 flex md:hidden">
                    <button type="button" class="inline-flex items-center justify-center p-2 rounded-md text-gray-400 hover:text-white hover:bg-gray-900 focus:outline-none">
                        <svg class="block h-6 w-6" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16" />
                        </svg>
                    </button>
                </div>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="flex-grow py-20 relative">
        <!-- Background Elements -->
        <div class="absolute inset-0 z-0">
            <div class="absolute top-1/4 right-0 w-[500px] h-[500px] bg-gold/10 rounded-full blur-[120px] pointer-events-none"></div>
            <div class="absolute bottom-0 left-1/4 w-[400px] h-[400px] bg-yellow-600/10 rounded-full blur-[100px] pointer-events-none"></div>
        </div>

        <div class="relative z-10 max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="text-center mb-16">
                <h1 class="text-gold text-sm font-bold tracking-widest uppercase mb-4 glow-text">Get in Touch</h1>
                <h2 class="text-4xl md:text-5xl font-extrabold tracking-tight">Let's Build Together</h2>
                <div class="h-1 w-20 bg-gold mx-auto mt-6 rounded-full glow-box"></div>
                <p class="mt-6 max-w-2xl mx-auto text-lg text-gray-400">Fill out the form below and our team will get back to you within 24 hours.</p>
            </div>

            <div class="max-w-3xl mx-auto">
                <div class="bg-white/5 border border-white/10 rounded-3xl p-8 md:p-12 backdrop-blur-md shadow-2xl">
                    <form action="#" method="POST" class="space-y-8">
                        
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                            <!-- Name -->
                            <div>
                                <label for="name" class="block text-sm font-medium text-gray-300 mb-2">Full Name</label>
                                <input type="text" name="name" id="name" placeholder="John Doe" 
                                    class="w-full bg-black border border-gray-700 rounded-xl px-4 py-3 text-white placeholder-gray-500 focus:outline-none focus:ring-2 focus:ring-gold focus:border-transparent transition-all">
                            </div>
                            <!-- Email -->
                            <div>
                                <label for="email" class="block text-sm font-medium text-gray-300 mb-2">Email Address</label>
                                <input type="email" name="email" id="email" placeholder="john@example.com" 
                                    class="w-full bg-black border border-gray-700 rounded-xl px-4 py-3 text-white placeholder-gray-500 focus:outline-none focus:ring-2 focus:ring-gold focus:border-transparent transition-all">
                            </div>
                        </div>

                        <!-- Service Requested -->
                        <div>
                            <label for="service" class="block text-sm font-medium text-gray-300 mb-2">Service Requested</label>
                            <div class="relative">
                                <select id="service" name="service" 
                                    class="w-full bg-black border border-gray-700 rounded-xl px-4 py-3 text-white appearance-none focus:outline-none focus:ring-2 focus:ring-gold focus:border-transparent transition-all cursor-pointer">
                                    <option value="" disabled selected>Select a service...</option>
                                    <option value="web">Full-Stack Web Development</option>
                                    <option value="frontend">Frontend & UI/UX Design</option>
                                    <option value="backend">Backend & API Development</option>
                                    <option value="ecommerce">E-Commerce Solutions</option>
                                    <option value="consulting">Technical Consulting</option>
                                </select>
                                <div class="pointer-events-none absolute inset-y-0 right-0 flex items-center px-4 text-gray-400">
                                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path></svg>
                                </div>
                            </div>
                        </div>

                        <!-- Message -->
                        <div>
                            <label for="message" class="block text-sm font-medium text-gray-300 mb-2">Project Details</label>
                            <textarea id="message" name="message" rows="5" placeholder="Tell us about your project..." 
                                class="w-full bg-black border border-gray-700 rounded-xl px-4 py-3 text-white placeholder-gray-500 focus:outline-none focus:ring-2 focus:ring-gold focus:border-transparent transition-all resize-none"></textarea>
                        </div>

                        <!-- Submit Button -->
                        <div>
                            <button type="submit" 
                                class="w-full flex justify-center py-4 px-4 border border-transparent rounded-xl shadow-sm text-base font-bold text-black bg-gold hover:bg-white focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-offset-black focus:ring-gold transition-all duration-300 hover:shadow-[0_0_20px_rgba(255,215,0,0.5)]">
                                Send Message
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </main>

    <!-- Footer -->
    <footer class="bg-black border-t border-white/10 pt-10 pb-10 mt-auto relative z-10">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 flex flex-col md:flex-row justify-between items-center text-gray-400">
            <div class="mb-6 md:mb-0 text-center md:text-left">
                <p class="text-lg">Website developed by <span class="text-gold font-bold tracking-wider glow-text">HexaCore</span></p>
                <p class="text-sm mt-1">&copy; 2026 All Rights Reserved.</p>
            </div>
            <div class="flex flex-col md:flex-row gap-6 md:gap-12 text-center md:text-right text-sm">
                <div class="group cursor-pointer">
                    <span class="block text-gold text-xs uppercase tracking-widest mb-1 group-hover:glow-text transition-all">Email Us</span>
                    <a href="mailto:HexaCore.Dev.YE@gmail.com" class="hover:text-white transition-colors">HexaCore.Dev.YE@gmail.com</a>
                </div>
                <div class="group cursor-default">
                    <span class="block text-gold text-xs uppercase tracking-widest mb-1 group-hover:glow-text transition-all">Location</span>
                    <span>Abu Dhabi, UAE</span>
                </div>
            </div>
        </div>
    </footer>

</body>
</html>
